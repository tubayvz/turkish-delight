<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turkish Delight | Kids</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Tam Ekran Bölünmüş Alan Düzeni */
        .kids-split-container {
            display: flex;
            width: 100%;
            height: calc(100vh - 80px); /* Menü yüksekliğinden sonra kalan tam alan */
            overflow: hidden;
            background-color: #f7f7f7; /* Resimlerin arkasında boşluk kalırsa çirkin durmasın diye lüks soft arka plan */
        }
        .split-side {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            background-repeat: no-repeat;
            background-position: center top; /* Resimleri yukardan başlatıyoruz ki kafalar asla kesilmesin */
            background-size: cover; /* Büyük ekranlarda tam kaplasın */
        }
        
        /* Büyük ekranlarda çocukların yüzü kaymasın diye odak noktasını tam yukarıya/merkeze ayarlıyoruz */
        .girls-side {
            background-image: linear-gradient(rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.3)), url('cda669ba8388abdc00e25dcfdf09edf8.jpg');
            background-position: center 10%; /* Tam olarak kız çocuğunun yüzüne odaklanır */
        }
        .boys-side {
            background-image: linear-gradient(rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.3)), url('470dbbeea2b4dcfec04039e4d7ead7b8.jpg');
            background-position: center 5%; /* Tam olarak erkek çocuğunun yüzüne odaklanır */
        }
        
        /* Üzerine gelindiğinde zarif genişleme efekti */
        .split-side:hover {
            flex: 1.1;
        }
        .split-content {
            text-align: center;
            position: relative;
            z-index: 10;
            margin-top: auto; /* Yazıları ve butonları biraz daha aşağıya alıyoruz ki çocukların yüzünü kapatmasınlar */
            margin-bottom: 50px;
        }
        .split-content h2 {
            font-size: 3.5rem;
            color: #ffffff !important;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 2px 4px 10px rgba(0, 0, 0, 0.6);
            margin-bottom: 20px;
            font-weight: 700;
        }
        .split-btn {
            display: inline-block;
            padding: 14px 40px;
            background: #ffffff;
            color: #3d3434;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border-radius: 4px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: none;
        }
        /* Üzerine gelindiğinde butonun markanın asil tonuna bürünmesi */
        .split-side:hover .split-btn {
            background: #b56576;
            color: #ffffff;
            box-shadow: 0 6px 20px rgba(181, 101, 118, 0.4);
        }

        /* Ekran yüksekliği küçük olan bilgisayarlar için resmin sığmasını sağlayan ekstra önlem */
        @media (max-height: 800px) {
            .split-side {
                background-size: contain; /* Kafalar kesinlikle kesilmez, resim ekrana sığar */
                background-color: #f2e6e6; /* Kız tarafı arka planı ile uyumlu soft bir ton */
            }
            .boys-side {
                background-color: #e6ecf2; /* Erkek tarafı arka planı ile uyumlu soft bir ton */
            }
            .split-content h2 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Turkish Delight</a>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="women.html">Women</a>
            <a href="men.html">Men</a>
            <a href="kids.html" class="active">Kids</a>
            <a href="beauty.html">Beauty</a>
            <a href="help.html">Help & Support</a>
        </nav>
        
        <div class="nav-icons" style="display: flex; align-items: center; gap: 20px;">
            <a href="login.html" style="font-size: 1rem; font-weight: 500; color: #555; text-decoration: none;">
                <i class="far fa-user" style="margin-right: 5px;"></i> Sign In
            </a>
            <div class="cart-icon" onclick="toggleCart()" style="cursor: pointer;">
                <i class="fas fa-shopping-bag"></i>
                <span id="cart-count">0</span>
            </div>
        </div>
    </header>

    <main class="kids-split-container">
        <a href="kids-girls.html" class="split-side girls-side">
            <div class="split-content">
                <h2>Girls</h2>
                <span class="split-btn">Shop Collection</span>
            </div>
        </a>

        <a href="kids-boys.html" class="split-side boys-side">
            <div class="split-content">
                <h2>Boys</h2>
                <span class="split-btn">Shop Collection</span>
            </div>
        </a>
    </main>

    <div id="side-cart" class="side-cart">
        <div class="cart-header">
            <h3>My Cart</h3>
            <span class="close-cart" onclick="toggleCart()">&times;</span>
        </div>
        <div id="cart-items" class="cart-items"></div>
        <div class="cart-footer">
            <div class="total-price">Total: <span id="cart-total">0.00</span> TL</div>
            <button class="checkout-btn" onclick="alert('Proceeding to checkout...')">Checkout</button>
        </div>
    </div>

    <script src="cart.js"></script>
</body>
</html>
