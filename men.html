<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turkish Delight | Men</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Kıyafetlerin en net ve şık göründüğü dikey dikdörtgen formatı */
        .product-card img {
            width: 100%;
            height: auto !important; /* style.css'teki sabit ayarı ezer */
            aspect-ratio: 3 / 4 !important; /* Fotoğrafı kare değil, boydan dikdörtgen yapar */
            object-fit: cover; /* Kutunun içini boşluk kalmadan tam doldurur */
            object-position: center top; /* Hizalamayı üstten yapar, böylece yüz/omuz kesilmez */
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <!-- NAVIGATION HEADER -->
    <header>
        <a href="index.html" class="logo">Turkish Delight</a>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="women.html">Women</a>
            <a href="men.html" class="active">Men</a>
            <a href="kids.html">Kids</a>
            <a href="beauty.html">Beauty</a>
            <a href="help.html">Help & Support</a>
        </nav>
        
        <div class="nav-icons" style="display: flex; align-items: center; gap: 20px;">
            <a href="login.html" style="font-size: 1rem; font-weight: 500; color: #555; text-decoration: none;">
                <i class="far fa-user" style="margin-right: 5px;"></i> Sign In
            </a>
            <div class="cart-icon" onclick="toggleCart()" style="cursor: pointer;">
                <i class="fas fa-shopping-bag"></i>
                <span id="cart-count">0</span>
            </div>
        </div>
    </header>

    <!-- MEN PRODUCTS SECTION -->
    <section class="section-padding container">
        <h2 class="section-title">Men's Collection</h2>
        <div class="product-grid">
            
            <!-- Ürün 1: Yeşil Gömlek Ceket -->
            <div class="product-card">
                <img src="8deddffceff6cee0da4c3d50443423c7.jpg" alt="Sage Green Overshirt">
                <h3>Sage Green Overshirt</h3>
                <p class="price">3400 TL</p>
                <button class="add-to-cart-btn" onclick="addToCart('Sage Green Overshirt', 3400)">Add to Cart</button>
            </div>
            
            <!-- Ürün 2: Kot Ceket -->
            <div class="product-card">
                <img src="a3345b371610fa3004c17055baee3f8d.jpg" alt="Classic Denim Jacket">
                <h3>Classic Denim Jacket</h3>
                <p class="price">1650 TL</p>
                <button class="add-to-cart-btn" onclick="addToCart('Classic Denim Jacket', 1650)">Add to Cart</button>
            </div>

        </div>
    </section>

    <!-- SIDE CART PANEL -->
    <div id="side-cart" class="side-cart">
        <div class="cart-header">
            <h3>My Cart</h3>
            <span class="close-cart" onclick="toggleCart()">&times;</span>
        </div>
        <div id="cart-items" class="cart-items"></div>
        <div class="cart-footer">
            <div class="total-price">Total: <span id="cart-total">0.00</span> TL</div>
            <button class="checkout-btn" onclick="alert('Proceeding to checkout...')">Checkout</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Turkish Delight. All Rights Reserved.</p>
    </footer>

    <script src="cart.js"></script>
</body>
</html>
