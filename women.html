<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turkish Delight | Women</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Fotoğrafların dikey dikdörtgen (3:4) formatında görünmesi için */
        .product-card img {
            width: 100%;
            height: auto !important; 
            aspect-ratio: 3 / 4 !important; 
            object-fit: cover; 
            object-position: center top; 
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Turkish Delight</a>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="women.html" class="active">Women</a>
            <a href="men.html">Men</a>
            <a href="kids.html">Kids</a>
            <a href="beauty.html">Beauty</a>
            <a href="help.html">Help & Support</a>
        </nav>
        
        <div class="nav-icons" style="display: flex; align-items: center; gap: 20px;">
            <a href="login.html" style="font-size: 1rem; font-weight: 500; color: #555; text-decoration: none;">
                <i class="far fa-user" style="margin-right: 5px;"></i> Sign In
            </a>
            <div class="cart-icon" onclick="toggleCart()" style="cursor: pointer;">
                <i class="fas fa-shopping-bag"></i>
                <span id="cart-count">0</span>
            </div>
        </div>
    </header>

    <section class="section-padding container">
        <h2 class="section-title">Women's Collection</h2>
        <div class="product-grid">
            
            <div class="product-card">
                <img src="5928ef32007d796dd3725ca20d84423c.jpg" alt="Olive Green Trench Coat">
                <h3>Olive Green Trench Coat</h3>
                <p class="price">2450 TL</p>
                <button class="add-to-cart-btn" onclick="addToCart('Olive Green Trench Coat', 2450)">Add to Cart</button>
            </div>
            
            <div class="product-card">
                <img src="c929d405cee969889eb21a95ec895221.jpg" alt="Floral Embroidered Set">
                <h3>Floral Embroidered Set</h3>
                <p class="price">1980 TL</p>
                <button class="add-to-cart-btn" onclick="addToCart('Floral Embroidered Set', 1980)">Add to Cart</button>
            </div>

        </div>
    </section>

    <div id="side-cart" class="side-cart">
        <div class="cart-header">
            <h3>My Cart</h3>
            <span class="close-cart" onclick="toggleCart()">&times;</span>
        </div>
        <div id="cart-items" class="cart-items"></div>
        <div class="cart-footer">
            <div class="total-price">Total: <span id="cart-total">0.00</span> TL</div>
            <button class="checkout-btn" onclick="alert('Proceeding to checkout...')">Checkout</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Turkish Delight. All Rights Reserved.</p>
    </footer>

    <script src="cart.js"></script>
</body>
</html>
