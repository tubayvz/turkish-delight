<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turkish Delight | Home</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .product-card img {
            width: 100%;
            height: auto !important; 
            aspect-ratio: 3 / 4 !important; 
            object-fit: cover; 
            object-position: center top; 
            border-radius: 4px;
        }

        /* Sağ üstteki çıtı pıtı arama kutusunun stili */
        .header-search-box {
            padding: 6px 15px;
            width: 140px;
            border: 1px solid #eaaaab;
            border-radius: 20px;
            outline: none;
            font-size: 0.85rem;
            font-family: inherit;
            color: #555;
            transition: all 0.3s ease;
            background-color: #fff;
        }
        .header-search-box:focus {
            border-color: #b56576;
            width: 180px;
            box-shadow: 0 2px 8px rgba(181, 101, 118, 0.15);
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Turkish Delight</a>
        <nav>
            <a href="index.html" class="active">Home</a>
            <a href="about.html">About Us</a>
            <a href="women.html">Women</a>
            <a href="men.html">Men</a>
            <a href="kids.html">Kids</a>
            <a href="beauty.html">Beauty</a>
            <a href="help.html">Help & Support</a>
        </nav>
        
        <div class="nav-icons" style="display: flex; align-items: center; gap: 15px;">
            
            <form action="search.html" method="GET" class="search-form">
                <input type="search" name="q" class="header-search-box" placeholder="Search products...">
            </form>

            <a href="login.html" id="user-menu" style="width: 75px; text-align: right; display: inline-block; font-size: 1rem; font-weight: 500; color: #555; text-decoration: none;">
                <i class="far fa-user" style="font-size: 1.2rem;"></i>
            </a>
            <div class="cart-icon" onclick="toggleCart()" style="cursor: pointer;">
                <i class="fas fa-shopping-bag"></i>
                <span id="cart-count">0</span>
            </div>
        </div>
    </header>

    <section class="hero" style="position: relative; overflow: hidden;">
        <img src="yenikapak.jpg" alt="Luxury Store" style="position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; width: auto; height: auto; transform: translate(-50%, -50%); object-fit: cover; z-index: 1;">
        <div class="video-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(234, 172, 184, 0.3), rgba(181, 101, 118, 0.4)); z-index: 2;"></div>
        
        <div class="hero-video-content" style="position: relative; z-index: 3; text-align: center; color: #fff; padding: 0 20px;">
            <h1 style="font-size: 3.5rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.4); margin-bottom: 20px;">Redefine Elegance</h1>
            <p style="font-size: 1.2rem; text-shadow: 1px 1px 3px rgba(0,0,0,0.4); margin-bottom: 30px;">Discover exclusive collections designed for your unique style.</p>
            <a href="#featured" class="btn">Explore Collections</a>
        </div>
    </section>

    <section id="featured" class="section-padding container">
        <h2 class="section-title">Featured Products</h2>
        <div class="product-grid" id="home-products-container"></div>
    </section>

    <div id="side-cart" class="side-cart">
        <div class="cart-header">
            <h3>My Cart</h3>
            <span class="close-cart" onclick="toggleCart()">&times;</span>
        </div>
        <div id="cart-items" class="cart-items"></div>
        <div class="cart-footer">
            <div class="total-price">Total: <span id="cart-total">0.00</span> TL</div>
            <button class="checkout-btn" onclick="alert('Proceeding to checkout...')">Checkout</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Turkish Delight. All Rights Reserved.</p>
    </footer>

    <script type="module">
        import allProductsData from './products-data.js'; // Ortak veriyi içe aktar

        const homeProductsContainer = document.getElementById('home-products-container');
        let productsHTML = '';

        allProductsData.forEach(product => {
            productsHTML += `
                <div class="product-card">
                    <img src="${product.imgSrc}" alt="${product.name}" loading="lazy">
                    <h3>${product.name}</h3>
                    <p class="price">${product.price} TL</p>
                    <button class="add-to-cart-btn" onclick="addToCart('${product.name}', ${product.price})">Add to Cart</button>
                </div>
            `;
        });
        homeProductsContainer.innerHTML = productsHTML;
    </script>

    <script src="cart.js"></script>
    <script src="bg-music.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
        
        const firebaseConfig = { 
            apiKey: "AIzaSyC3xCy1M7Kr52_RpGjM9jk4C-36qD9tCJc", 
            authDomain: "turkishdelight-16c0c.firebaseapp.com", 
            projectId: "turkishdelight-16c0c", 
            storageBucket: "turkishdelight-16c0c.firebasestorage.app", 
            appId: "1:277365000496:web:336485f88ce317436ca0f5" 
        };
        
        const auth = getAuth(initializeApp(firebaseConfig));
        const userMenuBtn = document.getElementById('user-menu');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                userMenuBtn.innerHTML = '<i class="far fa-user" style="font-size: 1.2rem;"></i>';
                userMenuBtn.href = "account.html";
            } else {
                userMenuBtn.innerHTML = '<i class="far fa-user" style="margin-right: 5px;"></i> Sign In';
                userMenuBtn.href = "login.html";
            }
        });
    </script>
</body>
</html>
