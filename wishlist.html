<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turkish Delight | My Wishlist</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 30px;
        }
        .product-card { position: relative; }
        .product-card img {
            width: 100%;
            height: auto !important; 
            aspect-ratio: 3 / 4 !important; 
            object-fit: cover; 
            border-radius: 4px;
        }
        .header-search-box {
            padding: 6px 15px; width: 140px; border: 1px solid #eaaaab; border-radius: 20px; outline: none; font-size: 0.85rem; background-color: #fff; transition: all 0.3s ease;
        }
        .header-search-box:focus { border-color: #b56576; width: 180px; }
        .fav-heart-btn {
            position: absolute; top: 15px; right: 15px; font-size: 1.3rem; color: #b56576; cursor: pointer; z-index: 10; background: rgba(255, 255, 255, 0.8); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }
        #empty-wishlist { text-align: center; padding: 80px 20px; color: #777; display: none; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Turkish Delight</a>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="women.html">Women</a>
            <a href="men.html">Men</a>
            <a href="kids.html">Kids</a>
            <a href="beauty.html">Beauty</a>
            <a href="help.html">Help & Support</a>
        </nav>
        
        <div class="nav-icons" style="display: flex; align-items: center; gap: 18px;">
            
            <form action="search.html" method="GET" class="search-form" style="margin: 0; display: flex; align-items: center;">
                <input type="search" name="q" class="header-search-box" placeholder="Search...">
            </form>

            <a href="wishlist.html" class="fav-icon" style="cursor: pointer; color: #b56576; position: relative; display: flex; align-items: center; text-decoration: none; margin: 0 2px;">
                <i class="fas fa-heart" style="font-size: 1.2rem;"></i>
                <span id="fav-count" style="position: absolute; top: -7px; right: -8px; background: #b56576; color: #fff; font-size: 0.65rem; width: 15px; height: 15px; border-radius: 50%; display: flex; align-items: center; justify-content: center;">0</span>
            </a>

            <a href="login.html" id="user-menu" style="display: flex; align-items: center; font-size: 1rem; font-weight: 500; color: #555; text-decoration: none; white-space: nowrap;">
                <i class="far fa-user" style="font-size: 1.2rem;"></i>
            </a>

            <div class="cart-icon" onclick="toggleCart()" style="cursor: pointer; color: #555; display: flex; align-items: center;">
                <i class="fas fa-shopping-bag"></i>
                <span id="cart-count">0</span>
            </div>
        </div>
    </header>

    <section class="section-padding container" style="margin-top: 40px;">
        <h2 class="section-title">My Favorites 🩷</h2>
        
        <div class="product-grid" id="wishlist-container"></div>

        <div id="empty-wishlist">
            <i class="far fa-heart" style="font-size: 3rem; color: #eaaaab; margin-bottom: 20px;"></i>
            <p style="font-size: 1.3rem;">Your wishlist is empty.</p>
            <a href="index.html" class="btn" style="margin-top: 25px; display: inline-block;">Explore Products</a>
        </div>
    </section>

    <div id="side-cart" class="side-cart">
        <div class="cart-header"><h3>My Cart</h3><span onclick="toggleCart()">&times;</span></div>
        <div id="cart-items" class="cart-items"></div>
        <div class="cart-footer"><div class="total-price">Total: <span id="cart-total">0.00</span> TL</div></div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const container = document.getElementById('wishlist-container');
            const emptyMsg = document.getElementById('empty-wishlist');
            let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];

            if (wishlist.length === 0) {
                container.style.display = "none";
                emptyMsg.style.display = "block";
            } else {
                let html = '';
                wishlist.forEach(product => {
                    html += `
                        <div class="product-card">
                            <div class="fav-heart-btn">
                                <i class="fas fa-heart" onclick="toggleFavCounter(this)"></i>
                            </div>
                            <img src="${product.imgSrc}" alt="${product.name}">
                            <h3>${product.name}</h3>
                            <p class="price">${product.price} TL</p>
                            <button class="add-to-cart-btn" onclick="addToCart('${product.name}', ${product.price})">Add to Cart</button>
                        </div>
                    `;
                });
                container.innerHTML = html;
            }
        });
    </script>

    <script src="fav.js"></script>
    <script src="cart.js"></script>
    <script src="bg-music.js"></script>
</body>
</html>
