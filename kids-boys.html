<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turkish Delight | Kids Boys</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Fotoğrafların dikey dikdörtgen (3:4) formatında görünmesi için */
        .product-card img {
            width: 100%;
            height: auto !important; 
            aspect-ratio: 3 / 4 !important; 
            object-fit: cover; 
            object-position: center top; 
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Turkish Delight</a>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="women.html">Women</a>
            <a href="men.html">Men</a>
            <a href="kids.html" class="active">Kids</a>
            <a href="beauty.html">Beauty</a>
            <a href="help.html">Help & Support</a>
        </nav>
        
        <div class="nav-icons" style="display: flex; align-items: center; gap: 20px;">
            <a href="login.html" id="user-menu" style="width: 75px; text-align: right; display: inline-block; font-size: 1rem; font-weight: 500; color: #555; text-decoration: none;">
                <i class="far fa-user" style="font-size: 1.2rem;"></i>
            </a>
            <div class="cart-icon" onclick="toggleCart()" style="cursor: pointer;">
                <i class="fas fa-shopping-bag"></i>
                <span id="cart-count">0</span>
            </div>
        </div>
    </header>

    <section class="section-padding container">
        <h2 class="section-title">Nav-icons' Collection</h2>
        <div class="product-grid">
            <div class="product-card">
                <img src="ea1849d9ea2ceb96adc32c3bb5a28d14.jpg" alt="Embroided Knitwear Shirt" loading="lazy">
                <h3>Embroided Knitwear Shirt</h3>
                <p class="price">620 TL</p>
                <button class="add-to-cart-btn" onclick="addToCart('Embroided Knitwear Shirt', 620)">Add to Cart</button>
            </div>
            
            <div class="product-card">
                <img src="637ec5ad6b6f7ed2c875d970c90d2433.jpg" alt="Relaxed Jeans" loading="lazy">
                <h3>Relaxed Jeans</h3>
                <p class="price">550 TL</p>
                <button class="add-to-cart-btn" onclick="addToCart('Relaxed Jeans', 550)">Add to Cart</button>
            </div>
        </div>
    </section>

    <div id="side-cart" class="side-cart">
        <div class="cart-header">
            <h3>My Cart</h3>
            <span class="close-cart" onclick="toggleCart()">&times;</span>
        </div>
        <div id="cart-items" class="cart-items"></div>
        <div class="cart-footer">
            <div class="total-price">Total: <span id="cart-total">0.00</span> TL</div>
            <button class="checkout-btn" onclick="alert('Proceeding to checkout...')">Checkout</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Turkish Delight. All Rights Reserved.</p>
    </footer>

    <script src="cart.js"></script>

    <script src="bg-music.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
        
        const firebaseConfig = { 
            apiKey: "AIzaSyC3xCy1M7Kr52_RpGjM9jk4C-36qD9tCJc", 
            authDomain: "turkishdelight-16c0c.firebaseapp.com", 
            projectId: "turkishdelight-16c0c", 
            storageBucket: "turkishdelight-16c0c.firebasestorage.app", 
            appId: "1:277365000496:web:336485f88ce317436ca0f5" 
        };
        
        const auth = getAuth(initializeApp(firebaseConfig));
        const userMenuBtn = document.getElementById('user-menu');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                userMenuBtn.innerHTML = '<i class="far fa-user" style="font-size: 1.2rem;"></i>';
                userMenuBtn.href = "account.html";
            } else {
                userMenuBtn.innerHTML = '<i class="far fa-user" style="margin-right: 5px;"></i> Sign In';
                userMenuBtn.href = "login.html";
            }
        });
    </script>
</body>
</html>
