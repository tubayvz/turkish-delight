<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turkish Delight | Sign In</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        .split-login { display: flex; height: 100vh; width: 100%; }
        .login-form-side { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; background: #fff; }
        .login-visual { flex: 1; background-image: url('24d5d7537b8007f1a1e8aa6d1eb0db5a.jpg'); background-size: cover; background-position: center; }
        .login-card { width: 100%; max-width: 400px; text-align: left; }
        .brand-title { font-size: 2rem; color: #b56576; margin-bottom: 30px; font-weight: 600; text-align: center; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; }
        .login-btn { width: 100%; padding: 14px; background: #b56576; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; margin-top: 10px; }
    </style>
</head>
<body>
<div class="split-login">
    <main class="login-form-side">
        <div class="login-card">
            <h1 class="brand-title"><a href="index.html" style="text-decoration: none; color: inherit;">Turkish Delight</a></h1>
            <h2>Sign In</h2>
            <p style="margin-bottom: 20px; color: #777;">Enter your details to access your account.</p>
            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="login-btn">Sign In</button>
            </form>
            <p id="error-message" style="color:red; margin-top:15px; font-weight: 500;"></p>
            <p style="margin-top:20px;">Don't have an account? <a href="register.html" style="color:#b56576; font-weight:600;">Join us quickly!</a></p>
        </div>
    </main>
    <div class="login-visual"></div>
</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
    
    const firebaseConfig = { 
        apiKey: "AIzaSyC3xCy1M7Kr52_RpGjM9jk4C-36qD9tCJc", 
        authDomain: "turkishdelight-16c0c.firebaseapp.com", 
        projectId: "turkishdelight-16c0c", 
        storageBucket: "turkishdelight-16c0c.firebasestorage.app", 
        appId: "1:277365000496:web:336485f88ce317436ca0f5" 
    };
    
    const auth = getAuth(initializeApp(firebaseConfig));
    
    document.getElementById('login-form').addEventListener('submit', (e) => {
        e.preventDefault();
        
        // Hata mesajını önce temizleyelim
        document.getElementById('error-message').innerText = "";
        
        signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)
            .then(() => { 
                alert("Login successful!"); 
                window.location.href = 'index.html'; 
            })
            .catch((error) => { 
                // BURASI DEĞİŞTİ: Artık Firebase'in asıl hatasını ekrana yazdıracak
                document.getElementById('error-message').innerText = "Hata: " + error.message; 
            });
    });
</script>
</body>
</html>
