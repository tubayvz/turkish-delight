<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turkish Delight | Kids Girls</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 🚨 FAVORİ KALBİ İÇİN KART AYARI GÜNCELLENDİ 🚨 */
        .product-card {
            position: relative;
        }

        /* Fotoğrafların dikey dikdörtgen (3:4) formatında görünmesi için */
        .product-card img {
            width: 100%;
            height: auto !important; 
            aspect-ratio: 3 / 4 !important; 
            object-fit: cover; 
            object-position: center top; 
            border-radius: 4px;
        }

        /* 🔍 SAĞ ÜSTTEKİ ÇITI PITI ARAMA KUTUSUNUN STİLİ 🔍 */
        .header-search-box {
            padding: 6px 15px;
            width: 140px;
            border: 1px solid #eaaaab;
            border-radius: 20px;
            outline: none;
            font-size: 0.85rem;
            font-family: inherit;
            color: #555;
            transition: all 0.3s ease;
            background-color: #fff;
        }
        .header-search-box:focus {
            border-color: #b56576;
            width: 180px;
            box-shadow: 0 2px 8px rgba(181, 101, 118, 0.15);
        }

        /* ❤️ FOTOĞRAF ÜZERİNDEKİ LÜKS KALP BUTONU STİLİ ❤️ */
        .fav-heart-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 1.3rem;
            color: #b56576;
            cursor: pointer;
            z-index: 10;
            background: rgba(255, 255, 255, 0.8);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s ease;
        }
        .fav-heart-btn:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Turkish Delight</a>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="women.html">Women</a>
            <a href="men.html">Men</a>
            <a href="kids.html" class="active">Kids</a>
            <a href="beauty.html">Beauty</a>
            <a href="help.html">Help & Support</a>
        </nav>
        
        <div class="nav-icons" style="display: flex; align-items: center; gap: 15px;">
            
            <form action="search.html" method="GET" class="search-form">
                <input type="search" name="q" class="header-search-box" placeholder="Search products...">
            </form>

            <a href="wishlist.html" class="fav-icon" style="cursor: pointer; color: #555; position: relative; margin: 0 5px; text-decoration: none;">
                <i class="far fa-heart" style="font-size: 1.2rem;"></i>
                <span id="fav-count" style="position: absolute; top: -7px; right: -8px; background: #b56576; color: #fff; font-size: 0.65rem; width: 15px; height: 15px; border-radius: 50%; display: flex; align-items: center; justify-content: center;">0</span>
            </a>

            <a href="login.html" id="user-menu" style="display: flex; align-items: center; font-size: 1rem; font-weight: 500; color: #555; text-decoration: none; white-space: nowrap;">
                <i class="far fa-user" style="font-size: 1.2rem;"></i>
            </a>
            
            <div class="cart-icon" onclick="toggleCart()" style="cursor: pointer;">
                <i class="fas fa-shopping-bag"></i>
                <span id="cart-count">0</span>
            </div>
        </div>
    </header>

    <section class="section-padding container">
        <h2 class="section-title">Girls' Collection</h2>
        <div class="product-grid">
            
            <div class="product-card">
                <div class="fav-heart-btn">
                    <i class="far fa-heart" onclick="toggleFavCounter(this)"></i>
                </div>
                <img src="2c0309d58c088837926ae155b95d30af.jpg" alt="Ribbed Polo Shirt" loading="lazy">
                <h3>Ribbed Polo Shirt</h3>
                <p class="price">450 TL</p>
                <button class="add-to-cart-btn" onclick="addToCart('Ribbed Polo Shirt', 450)">Add to Cart</button>
            </div>
            
            <div class="product-card">
                <div class="fav-heart-btn">
                    <i class="far fa-heart" onclick="toggleFavCounter(this)"></i>
                </div>
                <img src="673e691e48943058dda206260f16fe12.jpg" alt="Scallop Pocket Trousers" loading="lazy">
                <h3>Scallop Pocket Trousers</h3>
                <p class="price">580 TL</p>
                <button class="add-to-cart-btn" onclick="addToCart('Scallop Pocket Trousers', 580)">Add to Cart</button>
            </div>

        </div>
    </section>

    <div id="side-cart" class="side-cart">
        <div class="cart-header">
            <h3>My Cart</h3>
            <span class="close-cart" onclick="toggleCart()">&times;</span>
        </div>
        <div id="cart-items" class="cart-items"></div>
        <div class="cart-footer">
            <div class="total-price">Total: <span id="cart-total">0.00</span> TL</div>
            <button class="checkout-btn" onclick="alert('Proceeding to checkout...')">Checkout</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Turkish Delight. All Rights Reserved.</p>
    </footer>

    <script src="fav.js"></script>
    <script src="cart.js"></script>
    <script src="bg-music.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
        
        const firebaseConfig = { 
            apiKey: "AIzaSyC3xCy1M7Kr52_RpGjM9jk4C-36qD9tCJc", 
            authDomain: "turkishdelight-16c0c.firebaseapp.com", 
            projectId: "turkishdelight-16c0c", 
            storageBucket: "turkishdelight-16c0c.firebasestorage.app", 
            appId: "1:277365000496:web:336485f88ce317436ca0f5" 
        };
        
        const auth = getAuth(initializeApp(firebaseConfig));
        const userMenuBtn = document.getElementById('user-menu');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                userMenuBtn.innerHTML = '<i class="far fa-user" style="font-size: 1.2rem;"></i>';
                userMenuBtn.href = "account.html";
            } else {
                userMenuBtn.innerHTML = '<i class="far fa-user" style="margin-right: 5px;"></i> Sign In';
                userMenuBtn.href = "login.html";
            }
        });
    </script>
</body>
</html>
